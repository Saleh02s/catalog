<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>166 — Catalog</title>
  <meta name="description" content="166 service catalog — a digital flip-through magazine of our services." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260614-noclickthru" />
</head>
<body>
  <!-- Top brand bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">
        <span class="brand-badge">166</span>
        <span class="brand-chev" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 5 12 12 5 19"/><polyline class="c-y" points="12 5 19 12 12 19"/></svg>
        </span>
      </span>
      <span class="brand-text">Catalog</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <div class="actions-stack">
        <button class="topbar-btn" id="goContents" type="button" aria-label="Go to contents">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span class="label">Contents</span>
        </button>
        <div class="lang-switch" role="group" aria-label="Language">
          <button class="lang-btn" type="button" data-lang="az">AZ</button>
          <button class="lang-btn" type="button" data-lang="ru">RU</button>
          <button class="lang-btn" type="button" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <!-- The magazine -->
  <main class="stage">
    <div class="book" id="book" aria-live="polite">
      <!-- Pages are injected by script.js -->
    </div>
  </main>

  <!-- Navigation controls -->
  <nav class="controls" aria-label="Magazine navigation">
    <button class="nav-btn" id="prevBtn" type="button" aria-label="Previous page">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="page-indicator">
      <span id="pageNow">1</span><span class="sep">/</span><span id="pageTotal">1</span>
    </div>
    <button class="nav-btn" id="nextBtn" type="button" aria-label="Next page">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </nav>

  <!-- Demo toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js?v=20260614-noclickthru"></script>
</body>
</html>
